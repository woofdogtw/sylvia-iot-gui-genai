name: Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  LCOV_BADGE_VER: v0.2.0

jobs:
  lint-unit:
    name: Lint and Unit Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage

      - name: Install lcov and badge generator
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get install -y lcov
          curl -kLO https://github.com/romainreignier/lcov_badge_generator/releases/download/$LCOV_BADGE_VER/lcov_badge_generator
          chmod +x lcov_badge_generator
          sudo install lcov_badge_generator /usr/local/bin

      - name: Generate coverage badge
        if: github.event_name != 'pull_request'
        run: npm run badge -w packages/shell

      - name: Collect coverage report
        if: github.event_name != 'pull_request'
        run: |
          mkdir ./coverage
          cp -r packages/shell/coverage ./coverage/shell

      - name: Deploy coverage to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./coverage
          target-folder: docs/coverage

  e2e-core:
    name: E2E Tests (Core)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y sqlite3

      - name: Download deployment scripts
        run: git clone https://github.com/woofdogtw/sylvia-iot-deployment /tmp/sylvia-iot-deployment

      - name: Start backend services (RabbitMQ + EMQX + sylvia-iot-core)
        run: bash /tmp/sylvia-iot-deployment/scripts/start.sh --bin core

      - name: Add E2E redirect URI to OAuth2 public client
        run: bash .github/scripts/patch-oauth2-client.sh

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: packages/shell

      - name: Build SPA
        run: npm run build

      - name: Serve SPA on port 9000
        run: npx -y serve packages/shell/dist/spa -l 9000 &

      - name: Wait for web server
        run: timeout 30 bash -c 'until curl -sf http://localhost:9000; do sleep 1; done'

      - name: Run E2E tests (core)
        run: npx playwright test e2e/login.spec.js e2e/navigation.spec.js e2e/about.spec.js e2e/profile.spec.js e2e/unit.spec.js e2e/user.spec.js e2e/client.spec.js e2e/application.spec.js e2e/device.spec.js e2e/device-route.spec.js e2e/network.spec.js e2e/network-route.spec.js e2e/dldata-buffer.spec.js
        working-directory: packages/shell

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-core-results
          path: packages/shell/test-results/

  e2e-data:
    name: E2E Tests (Data)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y sqlite3

      - name: Download deployment scripts
        run: git clone https://github.com/woofdogtw/sylvia-iot-deployment /tmp/sylvia-iot-deployment

      - name: Start backend services (RabbitMQ + EMQX + sylvia-iot-core)
        run: bash /tmp/sylvia-iot-deployment/scripts/start.sh --bin core

      - name: Add E2E redirect URI to OAuth2 public client
        run: bash .github/scripts/patch-oauth2-client.sh

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: packages/shell

      - name: Build SPA
        run: npm run build

      - name: Serve SPA on port 9000
        run: npx -y serve packages/shell/dist/spa -l 9000 &

      - name: Wait for web server
        run: timeout 30 bash -c 'until curl -sf http://localhost:9000; do sleep 1; done'

      - name: Run E2E tests (data)
        run: npx playwright test e2e/data.spec.js
        working-directory: packages/shell

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-data-results
          path: packages/shell/test-results/

  e2e-router:
    name: E2E Tests (Router)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y sqlite3

      - name: Download deployment scripts
        run: git clone https://github.com/woofdogtw/sylvia-iot-deployment /tmp/sylvia-iot-deployment

      - name: Start backend services (RabbitMQ + EMQX + sylvia-router)
        run: bash /tmp/sylvia-iot-deployment/scripts/start.sh --bin router

      - name: Add E2E redirect URI to OAuth2 public client
        run: bash .github/scripts/patch-oauth2-client.sh

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
        working-directory: packages/shell

      - name: Build SPA
        run: npm run build

      - name: Serve SPA on port 9000
        run: npx -y serve packages/shell/dist/spa -l 9000 &

      - name: Wait for web server
        run: timeout 30 bash -c 'until curl -sf http://localhost:9000; do sleep 1; done'

      - name: Run E2E tests (router)
        run: npx playwright test e2e/router.spec.js
        working-directory: packages/shell

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-router-results
          path: packages/shell/test-results/
